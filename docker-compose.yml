services:
  postgres:
    image: postgres:16-alpine
    container_name: task-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-task}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-task}
      POSTGRES_DB: ${POSTGRES_DB:-task_management}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-task} -d ${POSTGRES_DB:-task_management}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
